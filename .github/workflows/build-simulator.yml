name: Build Simulator

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app || true

      - name: Resolve packages and prepare GeneratedModuleMaps
        run: |
          set -x
          xcodebuild -resolvePackageDependencies \
            -project OcrServer.xcodeproj \
            -scheme OcrServer 2>&1

          # Find SourcePackages checkouts dir
          SP=$(ls -d ~/Library/Developer/Xcode/DerivedData/*/SourcePackages 2>/dev/null | head -1)
          CHK="$SP/checkouts"
          echo "Checkouts dir: $CHK"
          
          if [ -d "$CHK" ]; then
            # Find all module.modulemap files from C targets
            maps=($(find "$CHK" -path '*/Sources/*/include/module.modulemap' 2>/dev/null))
            echo "Found ${#maps[@]} C module maps"
            
            # For each module map, extract module name and symlink into ALL packages' GeneratedModuleMaps
            for mm in "${maps[@]}"; do
              echo "Processing: $mm"
              # Extract module name from the directory containing the source
              MODULE_DIR=$(echo "$mm" | sed 's|.*/Sources/\(.*\)/include/module\.modulemap|\1|')
              MODULE_NAME="${MODULE_DIR##*/}"  # Get last component
              echo "Module: $MODULE_NAME"
              
              # Create symlinks in ALL packages' GeneratedModuleMaps dirs
              for pkg_dir in "$CHK"/*/; do
                pkg=$(basename "$pkg_dir")
                GENDIR="${pkg_dir}build/GeneratedModuleMaps-iphonesimulator"
                mkdir -p "$GENDIR"
                ln -sf "$mm" "$GENDIR/${MODULE_NAME}.modulemap"
              done
            done
            
            echo "Done setting up GeneratedModuleMaps"
          fi

      - name: Build for iOS Simulator
        run: |
          set -o pipefail
          PACKAGES=$(grep '"identity"' OcrServer.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved | sed 's/.*"identity" : "\(.*\)",/\1/')
          
          IFLAGS=""
          for pkg in $PACKAGES; do
            IFLAGS="$IFLAGS -I \$(BUILD_DIR)/../../$pkg/build/\$(CONFIGURATION)\$(EFFECTIVE_PLATFORM_NAME)"
          done
          
          OTHER_FLAGS="\$(inherited) $IFLAGS"
          
          xcodebuild build \
            -project OcrServer.xcodeproj \
            -target OcrServer \
            -sdk iphonesimulator \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=YES \
            OTHER_SWIFT_FLAGS="$OTHER_FLAGS" \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" 2>&1
