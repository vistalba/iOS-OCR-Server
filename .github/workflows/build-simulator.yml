name: Build Simulator

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app || true

      - name: Create and verify simulator
        run: |
          UDID=$(xcrun simctl create "CI-Phone" com.apple.CoreSimulator.SimDeviceType.iPhone-16-Pro com.apple.CoreSimulator.SimRuntime.iOS-18-5)
          echo "Created device: $UDID"
          echo "DEVICE_UDID=$UDID" >> $GITHUB_ENV
          echo "DEVICE_NAME=CI-Phone" >> $GITHUB_ENV
          # List available destinations for this project
          echo "=== Destinations ==="
          xcodebuild -showdestinations -project OcrServer.xcodeproj -scheme OcrServer -sdk iphonesimulator 2>&1 || true

      - name: Build for iOS Simulator
        run: |
          set -o pipefail
          xcodebuild build \
            -project OcrServer.xcodeproj \
            -scheme OcrServer \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,name=$DEVICE_NAME" \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" 2>&1
