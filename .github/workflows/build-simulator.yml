name: Build Simulator

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app || true

      - name: Resolve packages and collect module maps
        run: |
          set -x
          xcodebuild -resolvePackageDependencies \
            -project OcrServer.xcodeproj \
            -scheme OcrServer 2>&1

          # Find the DerivedData SourcePackages directory
          DD=~/Library/Developer/Xcode/DerivedData
          SP=$(ls -d "$DD"/*/SourcePackages 2>/dev/null | head -1)
          echo "SourcePackages path: $SP"

          if [ -n "$SP" ] && [ -d "$SP/checkouts" ]; then
            # Find all module.modulemap files and collect their include dirs
            MODULE_MAP_FLAGS=""
            while IFS= read -r mm; do
              INC_DIR=$(dirname "$mm")
              MODULE_MAP_FLAGS="$MODULE_MAP_FLAGS -Xcc -I\"$INC_DIR\""
            done < <(find "$SP/checkouts" -name 'module.modulemap' -path '*/include/*' 2>/dev/null)
            echo "Module map flags: $MODULE_MAP_FLAGS"
            echo "$MODULE_MAP_FLAGS" > /tmp/spm_cflags.txt
          else
            echo "No SourcePackages found" > /tmp/spm_cflags.txt
          fi

      - name: Build for iOS Simulator
        run: |
          set -o pipefail
          PACKAGES=$(grep '"identity"' OcrServer.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved | sed 's/.*"identity" : "\(.*\)",/\1/')
          
          IFLAGS=""
          for pkg in $PACKAGES; do
            IFLAGS="$IFLAGS -I \$(BUILD_DIR)/../../$pkg/build/\$(CONFIGURATION)\$(EFFECTIVE_PLATFORM_NAME)"
          done
          
          CFLAGS=$(cat /tmp/spm_cflags.txt 2>/dev/null || echo "")
          
          OTHER_FLAGS="\$(inherited) $IFLAGS $CFLAGS"
          
          xcodebuild build \
            -project OcrServer.xcodeproj \
            -target OcrServer \
            -sdk iphonesimulator \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=YES \
            OTHER_SWIFT_FLAGS="$OTHER_FLAGS" \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" 2>&1
