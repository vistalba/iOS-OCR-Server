name: Build Simulator

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app || true

      - name: Resolve packages and collect C module map paths
        run: |
          set -x
          xcodebuild -resolvePackageDependencies \
            -project OcrServer.xcodeproj \
            -scheme OcrServer 2>&1

          # Find SourcePackages checkouts dir
          SP=$(ls -d ~/Library/Developer/Xcode/DerivedData/*/SourcePackages 2>/dev/null | head -1)
          CHK="$SP/checkouts"
          
          if [ -d "$CHK" ]; then
            # Find all C module.modulemap files - these are in the source that won't be deleted
            FMAPS=$(find "$CHK" -name 'module.modulemap' -path '*/include/*' 2>/dev/null)
            FFLAGS=""
            for f in $FMAPS; do
              FFLAGS="$FFLAGS -Xcc -fmodule-map-file=$f"
            done
            echo "Module map flags: $FFLAGS"
            echo "$FFLAGS" > /tmp/spm_c_module_flags.txt
          fi

      - name: Build for iOS Simulator
        run: |
          set -o pipefail
          PACKAGES=$(grep '"identity"' OcrServer.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved | sed 's/.*"identity" : "\(.*\)",/\1/')
          
          IFLAGS=""
          for pkg in $PACKAGES; do
            IFLAGS="$IFLAGS -I \$(BUILD_DIR)/../../$pkg/build/\$(CONFIGURATION)\$(EFFECTIVE_PLATFORM_NAME)"
          done
          
          # Add absolute module map paths (won't be deleted since they're in source, not build dirs)
          CFLAGS=$(cat /tmp/spm_c_module_flags.txt 2>/dev/null || echo "")
          
          OTHER_FLAGS="\$(inherited) $IFLAGS $CFLAGS"
          
          xcodebuild build \
            -project OcrServer.xcodeproj \
            -target OcrServer \
            -sdk iphonesimulator \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=YES \
            OTHER_SWIFT_FLAGS="$OTHER_FLAGS" \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" 2>&1
