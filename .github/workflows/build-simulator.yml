name: Build Simulator

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16.4
        run: sudo xcode-select -s /Applications/Xcode_16.4.app || true

      - name: Show Xcode version
        run: xcodebuild -version

      - name: List available simulators
        run: xcrun simctl list devices available 2>&1 | head -30

      - name: Build for iOS Simulator
        run: |
          set -o pipefail
          xcodebuild build \
            -project OcrServer.xcodeproj \
            -target OcrServer \
            -sdk iphonesimulator \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=YES \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" 2>&1
