name: Build Simulator

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app || true

      - name: Build for iOS Simulator
        run: |
          set -o pipefail
          xcodebuild build \
            -workspace OcrServer.xcodeproj/project.xcworkspace \
            -scheme OcrServer \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,id=B6925D84-723C-4966-9F12-5570B9217301' \
            IPHONEOS_DEPLOYMENT_TARGET=18.6 \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" 2>&1
