name: Build Simulator

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app || true

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Prepare and boot simulator
        run: |
          RUNTIME=$(xcrun simctl list runtimes | grep 'iOS 18\.5' | head -1 | awk '{print $NF}')
          echo "Runtime: $RUNTIME"
          UDID=$(xcrun simctl create "ci-phone" com.apple.CoreSimulator.SimDeviceType.iPhone-16-Pro "$RUNTIME")
          echo "Created: $UDID"
          xcrun simctl boot "$UDID"
          xcrun simctl list devices | grep "$UDID"
          echo "DEVICE_UDID=$UDID" >> $GITHUB_ENV

      - name: Build for iOS Simulator
        run: |
          set -o pipefail
          xcodebuild build \
            -project OcrServer.xcodeproj \
            -scheme OcrServer \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,id=${{ env.DEVICE_UDID }}" \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" 2>&1
