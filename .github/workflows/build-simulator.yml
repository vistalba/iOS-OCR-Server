name: Build Simulator

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.3.app || true

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Create simulator device
        run: |
          DEVICE_UDID=$(xcrun simctl create "CI-iPhone" com.apple.CoreSimulator.SimDeviceType.iPhone-16-Pro com.apple.CoreSimulator.SimRuntime.iOS-18-5 2>&1)
          echo "DEVICE_UDID=$DEVICE_UDID" >> $GITHUB_ENV

      - name: Build for iOS Simulator
        run: |
          set -o pipefail
          xcodebuild build \
            -project OcrServer.xcodeproj \
            -scheme OcrServer \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,id=${{ env.DEVICE_UDID }}" \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" 2>&1

      - name: Cleanup simulator
        if: always()
        run: xcrun simctl delete "${{ env.DEVICE_UDID }}" 2>/dev/null || true
